<svg viewBox="0 0 1200 320" width="1200" height="320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ivan Orpiano — AI Automation Engineer">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0b0a1f"/>
      <stop offset="0.5" stop-color="#14122e"/>
      <stop offset="1"   stop-color="#0b0a1f"/>
    </linearGradient>

    <!-- Animated shimmer gradient for the name fill -->
    <linearGradient id="name-fill" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse"
      x1="200" y1="0" x2="1000" y2="0">
      <stop offset="0"    stop-color="#a78bfa"/>
      <stop offset="0.35" stop-color="#7C3AED"/>
      <stop offset="0.5"  stop-color="#c4b5fd"/>
      <stop offset="0.65" stop-color="#4F46E5"/>
      <stop offset="1"    stop-color="#6366F1"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-500 0" to="500 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1"   stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>

    <!-- Dot-grid pattern (nods to your portfolio aesthetic) -->
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#6366F1" opacity="0.16"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .name {
        font-family: 'JetBrains Mono','Fira Code',ui-monospace,'Courier New',monospace;
        font-size: 82px; font-weight: 800; letter-spacing: 2px;
      }
      .sub {
        font-family: 'JetBrains Mono','Fira Code',ui-monospace,'Courier New',monospace;
        font-size: 19px; font-weight: 500; letter-spacing: 4px; fill: #DDD6FE;
      }
      .prompt { fill: #7C3AED; }

      /* stroke draws in */
      .stroke {
        fill: none; stroke: #a78bfa; stroke-width: 1.4;
        stroke-dasharray: 2600; stroke-dashoffset: 2600;
        animation: draw 2.2s ease forwards;
      }
      /* gradient fill fades in after the outline is drawn */
      .fill {
        fill: url(#name-fill); opacity: 0;
        animation: fillin 1.4s ease 1.5s forwards;
      }
      .underline {
        stroke: url(#rule); stroke-width: 2.5;
        stroke-dasharray: 760; stroke-dashoffset: 760;
        animation: draw 1.4s ease 1.9s forwards;
      }
      .subwrap { opacity: 0; animation: fillin 1s ease 2.5s forwards; }
      .cursor  { fill: #a78bfa; animation: blink 1.05s steps(1) infinite 2.6s; }

      @keyframes draw   { to { stroke-dashoffset: 0; } }
      @keyframes fillin { to { opacity: 1; } }
      @keyframes blink  { 50% { opacity: 0; } }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="320" fill="none" stroke="#312e81" stroke-opacity="0.4" stroke-width="2" rx="0"/>

  <!-- corner accents -->
  <path d="M24 40 L24 24 L40 24" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.7"/>
  <path d="M1176 40 L1176 24 L1160 24" fill="none" stroke="#6366F1" stroke-width="2.5" opacity="0.7"/>
  <path d="M24 280 L24 296 L40 296" fill="none" stroke="#6366F1" stroke-width="2.5" opacity="0.7"/>
  <path d="M1176 280 L1176 296 L1160 296" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.7"/>

  <!-- NAME: drawn outline + shimmer fill stacked -->
  <g filter="url(#glow)">
    <text class="name stroke" x="600" y="150" text-anchor="middle">IVAN ORPIANO</text>
    <text class="name fill"   x="600" y="150" text-anchor="middle">IVAN ORPIANO</text>
  </g>

  <!-- animated underline -->
  <line class="underline" x1="220" y1="188" x2="980" y2="188"/>

  <!-- subtitle with terminal cursor -->
  <g class="subwrap">
    <text class="sub" x="600" y="238" text-anchor="middle"><tspan class="prompt">&gt; </tspan>AI AUTOMATION ENGINEER<tspan class="cursor"> _</tspan></text>
    <text class="sub" x="600" y="272" text-anchor="middle" opacity="0.6" style="font-size:15px;letter-spacing:3px;">RAG · LLM APPS · FastAPI + React · n8n</text>
  </g>
</svg>
